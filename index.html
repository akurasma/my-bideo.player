<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>シンプル動画プレイヤー</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 800px;
            width: 100%;
            text-align: center;
        }
        h1 { color: #ff4757; }
        .input-area {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }
        input[type="text"] {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 6px;
            background-color: #1e1e1e;
            color: #fff;
        }
        button {
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            background-color: #ff4757;
            color: white;
            cursor: pointer;
            font-weight: bold;
        }
        .video-container {
            position: relative;
            width: 100%;
            padding-top: 56.25%;
            background-color: #000;
            border-radius: 8px;
            display: none;
        }
        .video-container iframe, .video-container video {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%; border: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>シンプル動画プレイヤー</h1>
    <div class="input-area">
        <input type="text" id="videoUrl" placeholder="動画のURLを入力">
        <button onclick="playVideo()">再生</button>
    </div>
    <div class="video-container" id="videoContainer"></div>
</div>

<script>
function playVideo() {
    const urlInput = document.getElementById('videoUrl').value.trim();
    const container = document.getElementById('videoContainer');
    container.innerHTML = '';
    container.style.display = 'none';

    if (!urlInput) return;

    if (urlInput.includes('youtube.com/watch') || urlInput.includes('youtu.be/')) {
        let videoId = '';
        if (urlInput.includes('youtube.com/watch')) {
            const urlParams = new URLSearchParams(new URL(urlInput).search);
            videoId = urlParams.get('v');
        } else if (urlInput.includes('youtu.be/')) {
            videoId = urlInput.split('/').pop().split('?')[0];
        }
        if (videoId) {
            container.innerHTML = `<iframe src="https://www.youtube.com/embed/${videoId}?autoplay=1" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>`;
            container.style.display = 'block';
        }
    } else if (urlInput.match(/\.(mp4|webm|ogg)(\?.*)?$/i)) {
        container.innerHTML = `<video src="${urlInput}" controls autoplay></video>`;
        container.style.display = 'block';
    } else if (urlInput.startsWith('http')) {
        container.innerHTML = `<iframe src="${urlInput}" allowfullscreen></iframe>`;
        container.style.display = 'block';
    }
}
</script>

</body>
</html>
